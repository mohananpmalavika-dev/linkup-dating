<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DatingHub Referral Code Generator - Admin Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      background-color: #f8f9ff;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-size: 12px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e0e0e0;
    }

    .status {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
      border-left: 4px solid #1976d2;
    }

    .status.success {
      background: #e8f5e9;
      color: #388e3c;
      border-left: 4px solid #388e3c;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      border-left: 4px solid #c62828;
    }

    .results {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 15px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      display: none;
    }

    .results.show {
      display: block;
    }

    .info-box {
      background: #f0f4ff;
      border: 1px solid #c5d9f5;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
    }

    .info-box strong {
      color: #667eea;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(102, 126, 234, 0.3);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 DatingHub Referral Code Generator</h1>
    <p class="subtitle">Admin Tool - Generate referral codes for all users</p>

    <div class="info-box">
      <strong>📌 Important:</strong> You must be logged in as an admin user. Your authorization token will be automatically retrieved from localStorage.
    </div>

    <div class="form-group">
      <label for="authToken">Authorization Token</label>
      <textarea id="authToken" placeholder="Will be auto-populated from your browser storage..." readonly></textarea>
      <small style="color: #999; display: block; margin-top: 5px;">Automatically fetched from localStorage</small>
    </div>

    <div class="button-group">
      <button class="btn-primary" id="generateBtn" onclick="generateAllCodes()">
        🚀 Generate Codes for All Users
      </button>
      <button class="btn-secondary" onclick="checkStats()">
        📊 Check Stats
      </button>
    </div>

    <div id="status" class="status"></div>

    <div id="results" class="results"></div>

    <div id="summary" style="display: none;"></div>
  </div>

  <script>
    // Auto-load token from localStorage
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token') || 
                    localStorage.getItem('authToken') ||
                    localStorage.getItem('jwt') ||
                    sessionStorage.getItem('token');
      
      if (token) {
        document.getElementById('authToken').value = token;
      } else {
        showStatus('error', '❌ No authentication token found. Please log in first.');
      }
    });

    function showStatus(type, message) {
      const status = document.getElementById('status');
      status.className = `status show ${type}`;
      status.innerHTML = message;
    }

    function showResults(html) {
      const results = document.getElementById('results');
      results.innerHTML = html;
      results.classList.add('show');
    }

    async function generateAllCodes() {
      const token = document.getElementById('authToken').value;

      if (!token) {
        showStatus('error', '❌ No token provided. Please log in first.');
        return;
      }

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;

      showStatus('loading', '<span class="spinner"></span>Generating referral codes for all users...');
      document.getElementById('results').classList.remove('show');

      try {
        const response = await fetch('/api/admin/referrals/generate-all', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Failed to generate codes');
        }

        showStatus('success', 
          `✅ <strong>Success!</strong> Generated ${data.summary.codesCreated} codes, Skipped ${data.summary.codesSkipped}, Errors ${data.summary.errors}`
        );

        // Show summary
        const summaryHtml = `
          <div style="margin-top: 20px;">
            <h3 style="margin-bottom: 15px; color: #333;">📋 Summary</h3>
            <div class="stat-card">
              <div class="stat-label">Total Users</div>
              <div class="stat-value">${data.summary.totalUsers}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Codes Created</div>
              <div class="stat-value" style="color: #4caf50;">${data.summary.codesCreated}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Already Existing</div>
              <div class="stat-value" style="color: #ff9800;">${data.summary.codesSkipped}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Errors</div>
              <div class="stat-value" style="color: ${data.summary.errors > 0 ? '#f44336' : '#4caf50'};">${data.summary.errors}</div>
            </div>
          </div>
        `;
        document.getElementById('summary').innerHTML = summaryHtml;
        document.getElementById('summary').style.display = 'block';

        // Show details
        if (data.details && data.details.length > 0) {
          const detailsHtml = data.details.map(d => 
            `${d.status === 'created' ? '✅' : d.status === 'skipped' ? '⏭️' : '❌'} User ${d.userId} (${d.email}): ${d.code || 'N/A'}`
          ).join('\n');
          showResults(detailsHtml);
        }
      } catch (error) {
        showStatus('error', `❌ <strong>Error:</strong> ${error.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    async function checkStats() {
      const token = document.getElementById('authToken').value;

      if (!token) {
        showStatus('error', '❌ No token provided. Please log in first.');
        return;
      }

      showStatus('loading', '<span class="spinner"></span>Fetching statistics...');

      try {
        const response = await fetch('/api/admin/referrals/stats', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Failed to fetch stats');
        }

        showStatus('success', '✅ Statistics retrieved successfully');

        const summaryHtml = `
          <div style="margin-top: 20px;">
            <h3 style="margin-bottom: 15px; color: #333;">📊 System Statistics</h3>
            <div class="stat-card">
              <div class="stat-label">Total Users</div>
              <div class="stat-value">${data.stats.totalUsers}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Users with Codes</div>
              <div class="stat-value">${data.stats.usersWithReferralCodes}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Coverage</div>
              <div class="stat-value">${data.stats.coveragePercentage}</div>
            </div>
            <div style="margin-top: 15px; padding: 10px; background: #f0f0f0; border-radius: 6px;">
              <strong>By Status:</strong>
              <div style="margin-top: 8px; font-size: 13px;">
                Pending: ${data.stats.referralsByStatus.pending || 0}<br>
                Completed: ${data.stats.referralsByStatus.completed || 0}<br>
                Expired: ${data.stats.referralsByStatus.expired || 0}
              </div>
            </div>
          </div>
        `;
        document.getElementById('summary').innerHTML = summaryHtml;
        document.getElementById('summary').style.display = 'block';
      } catch (error) {
        showStatus('error', `❌ <strong>Error:</strong> ${error.message}`);
      }
    }
  </script>
</body>
</html>
